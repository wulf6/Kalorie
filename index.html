<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" id="theme-meta" content="#6366f1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Kalorie"/>
<meta name="application-name" content="Kalorie"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<title>Kalorie AI - Kompletní synchronizace</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none;font-family:system-ui,-apple-system,sans-serif}
button,input,select,textarea{font-family:inherit}
button:active{opacity:.82}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
textarea{resize:none}
input[type=number]::-webkit-inner-spin-button{opacity:1}

:root{
  --bg:#f1f5f9;--card:#fff;--surface:#f1f5f9;--border:#e2e8f0;
  --text:#1e293b;--muted:#6b7280;--track:#e2e8f0;
  --sheet-radius:20px 20px 0 0;
  --fab-bottom:24px;
  --top-safe:env(safe-area-inset-top,0px);
  --bot-safe:env(safe-area-inset-bottom,0px);
  --fs-xs:10px;--fs-sm:12px;--fs-base:14px;--fs-md:15px;--fs-lg:16px;--fs-xl:18px;--fs-xxl:24px;
}
@media all and (display-mode: standalone){
  body{ padding-top:var(--top-safe); }
  .sticky-header{ top:var(--top-safe) !important; }
}
.dark{--bg:#0a0f1e;--card:#0f172a;--surface:#1e293b;--border:#1e293b;--text:#f1f5f9;--muted:#64748b;--track:#1e293b}

body{background:var(--bg);color:var(--text);transition:background .3s,color .3s}

.tab-btn{padding:13px 15px;border:none;background:transparent;font-size:var(--fs-sm);font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab-btn.active{color:#6366f1;border-bottom-color:#6366f1}

.card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden}
.inp{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:var(--fs-base);padding:11px 13px;outline:none;width:100%;transition:border-color .2s}
.inp:focus{border-color:#6366f1}
.inp::placeholder{color:var(--muted)}
.btn-pri{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:var(--fs-base);font-weight:700;cursor:pointer;padding:13px;width:100%;transition:opacity .2s}
.btn-pri:disabled{opacity:.4;cursor:not-allowed}
.prog-bar{background:var(--track);border-radius:99px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .5s ease}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.sheet{
  width:100%;max-width:640px;
  background:var(--card);
  border-radius:var(--sheet-radius);
  border:1px solid var(--border);
  padding:20px 20px max(20px, calc(env(safe-area-inset-bottom) + 20px));
  height:90dvh;
  max-height:90dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.sheet-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-right:2px}
.sheet-footer{flex-shrink:0;padding-top:12px;border-top:1px solid var(--border);margin-top:8px}

.entry{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:8px;animation:slideUp .22s ease}

.slot-btn{padding:5px 11px;border-radius:99px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s}
.slot-btn.active{border-color:#6366f1;color:#6366f1;font-weight:700}
.mode-tab{flex:1;padding:8px 4px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-weight:500;cursor:pointer;font-size:12px;transition:all .2s;white-space:nowrap}
.mode-tab.active{background:#6366f1;color:#fff;font-weight:700}
.tempo-btn{flex:1;padding:9px 4px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-weight:600;cursor:pointer;font-size:11px;text-align:center;line-height:1.5;transition:all .2s}
.tempo-btn.active{border-color:#f59e0b;background:rgba(245,158,11,.08);color:#92400e}
.dark .tempo-btn.active{color:#fbbf24}
.gender-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-weight:600;cursor:pointer;font-size:14px;transition:all .2s}
.gender-btn.active{border-color:#6366f1;color:#6366f1}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .7s linear infinite}

.fab{position:fixed;bottom:var(--fab-bottom);right:20px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:28px;line-height:1;border:none;box-shadow:0 6px 20px rgba(99,102,241,.5);z-index:200;cursor:pointer;display:flex;align-items:center;justify-content:center}

@media (orientation:landscape) and (max-height:500px){
  .sheet{height:100dvh;max-height:100dvh;border-radius:0;padding:12px 16px}
  .sticky-header .tab-btn{padding:8px 12px;font-size:12px}
}
@media (min-width:768px){
  :root{--sheet-radius:16px;--fab-bottom:32px}
  .modal-overlay{align-items:center}
  .sheet{height:auto;max-height:85vh;border-radius:16px;max-width:560px}
  .tab-btn{font-size:14px;padding:14px 18px}
  .mode-tab{font-size:13px}
}
@media (min-width:1024px){
  :root{--fab-bottom:40px}
  .sheet{max-width:600px;max-height:80vh}
  .modal-overlay{align-items:center}
  body{font-size:15px}
  .inp{font-size:15px}
  .tab-btn{font-size:15px;padding:15px 20px}
}
.fab{padding-bottom:0;bottom:max(var(--fab-bottom),calc(env(safe-area-inset-bottom) + 16px));right:max(20px,calc(env(safe-area-inset-right) + 16px))}

/* Toast bublina */
.toast-notification{
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:linear-gradient(135deg,#16a34a,#15803d);
  color:white;
  padding:12px 24px;
  border-radius:50px;
  font-weight:600;
  font-size:14px;
  z-index:10000;
  box-shadow:0 4px 20px rgba(22,163,74,0.4);
  opacity:0;
  transition:all 0.3s ease;
  pointer-events:none;
  white-space:nowrap;
  max-width:90vw;
  white-space:normal;
  text-align:center;
}
.toast-notification.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
.toast-notification.error{
  background:linear-gradient(135deg,#dc2626,#b91c1c);
  box-shadow:0 4px 20px rgba(220,38,38,0.4);
}
.toast-notification.warning{
  background:linear-gradient(135deg,#f59e0b,#d97706);
  box-shadow:0 4px 20px rgba(245,158,11,0.4);
}
</style>
</head>
<body>
<div id="splash" style="position:fixed;inset:0;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s">
  <div style="font-size:72px;margin-bottom:16px">🍽</div>
  <div style="color:#fff;font-size:24px;font-weight:800;letter-spacing:1px">Kalorie AI</div>
  <div style="color:rgba(255,255,255,.7);font-size:14px;margin-top:8px">Načítám databázi…</div>
  <div style="color:rgba(255,255,255,.5);font-size:11px;margin-top:4px" id="splash-status">připravuji…</div>
</div>
<div id="app"></div>

<div id="toast-notification" class="toast-notification">📤 Data odeslána</div>

<div id="macro-detail-modal" style="display:none" class="macro-detail-modal" onclick="closeMacroDetail()">
  <div class="macro-detail-card" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span id="macro-detail-title" style="font-size:18px;font-weight:800"></span>
      <button onclick="closeMacroDetail()" style="background:var(--surface);border:none;border-radius:8px;padding:4px 12px;font-size:18px;cursor:pointer;color:var(--muted)">×</button>
    </div>
    <div id="macro-detail-list" style="max-height:55vh;overflow-y:auto"></div>
    <div id="macro-detail-total" style="margin-top:14px;padding-top:12px;border-top:2px solid var(--border);font-weight:700;text-align:right;font-size:15px"></div>
  </div>
</div>

<div id="add-sheet" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeAdd()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-shrink:0">
      <div style="font-size:16px;font-weight:700;color:var(--text)">Přidat jídlo</div>
      <button onclick="closeAdd()" style="background:var(--surface);border:none;border-radius:8px;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 10px">×</button>
    </div>
    <div id="slot-row" style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;flex-shrink:0"></div>
    <div style="display:flex;gap:0;margin-bottom:12px;background:var(--surface);border-radius:10px;padding:3px;flex-shrink:0">
      <button class="mode-tab active" id="tab-manual" onclick="setMode('manual')">✏️ Ručně</button>
      <button class="mode-tab" id="tab-ai" onclick="setMode('ai')">🤖 AI</button>
      <button class="mode-tab" id="tab-ean" onclick="setMode('ean')">📷 Sken</button>
      <button class="mode-tab" id="tab-saved" onclick="setMode('saved')">⭐ Moje</button>
    </div>
    <div class="sheet-body">
      <div id="panel-manual">
        <input class="inp" id="m-name" placeholder="Název jídla" style="margin-bottom:8px"/>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
          <input class="inp" type="number" id="m-kcal" placeholder="Kalorie"/>
          <input class="inp" type="number" id="m-g" placeholder="Gramy" value="100"/>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
          <input class="inp" type="number" id="m-b" placeholder="Bílkoviny"/>
          <input class="inp" type="number" id="m-s" placeholder="Sacharidy"/>
          <input class="inp" type="number" id="m-t" placeholder="Tuky"/>
        </div>
        <button class="btn-pri" onclick="handleManual()">✅ Přidat</button>
      </div>
      <div id="panel-ai" style="display:none">
        <textarea id="ai-input" class="inp" rows="2" placeholder="Popiš jídlo..."></textarea>
        <button class="btn-pri" id="ai-btn" onclick="handleAI()" style="margin-top:10px">🤖 Analyzovat přes Gemini</button>
      </div>
      <div id="panel-ean" style="display:none">
        <input class="inp" id="ean-inp" placeholder="EAN kód"/>
        <button class="btn-pri" onclick="handleEan()" style="margin-top:10px">🔍 Najít produkt</button>
      </div>
      <div id="panel-saved" style="display:none">
        <div id="saved-view-list"></div>
        <button onclick="showCreateFood()" class="btn-pri" style="margin-top:10px">+ Vytvořit jídlo</button>
      </div>
      <div id="panel-foodeditor" style="display:none"></div>
    </div>
    <div class="sheet-footer">
      <div id="add-err" style="display:none;padding:8px;background:#fef2f2;border-radius:8px;color:#ef4444;margin-bottom:6px"></div>
      <div id="add-ok" style="display:none;padding:8px;background:#f0fdf4;border-radius:8px;color:#16a34a"></div>
    </div>
  </div>
</div>

<script>
// ==================== KONSTANTY ====================
const BACKEND_URL = "https://kalorie-backend-ny34.onrender.com";
const SLOTS = ["Snídaně","Svačina","Oběd","Svačina 2","Večeře"];
const TODAY = () => new Date().toISOString().slice(0,10);
const ls = (k,d) => { try{ return JSON.parse(localStorage.getItem(k)||JSON.stringify(d)); }catch{ return d; } };
const sv = (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} };

// ==================== TOAST BUBLINA ====================
function showToast(message, type = "success"){
  const toast = document.getElementById("toast-notification");
  if(!toast) return;
  toast.textContent = message;
  toast.className = "toast-notification " + type;
  setTimeout(() => toast.classList.add("show"), 10);
  setTimeout(() => toast.classList.remove("show"), 3000);
}

// ==================== STAV APLIKACE ====================
let dark = ls("dark2", false);
let tab = "dnes";
let entries = ls("ent_"+TODAY(), []);
let hist = ls("hist2", {});
let profile = ls("prof2", {vaha:80,vyska:178,vek:30,pohlavi:"muz",aktivita:1.4,cilVaha:0,tempo:0.5,geminiKey:"",syncUsername:"",_profileTs:Date.now()});
let activeSlot = "Oběd";
let addMode = "manual";
let expanded = new Set();
let profTab = "zakladni";

if(dark) document.body.classList.add("dark");

// ==================== VÝPOČTY ====================
function calcBMR(v,h,a,g){ return g==="muz"?10*v+6.25*h-5*a+5:10*v+6.25*h-5*a-161; }
function targets(){
  const p = profile;
  const bmr = Math.round(calcBMR(p.vaha,p.vyska,p.vek,p.pohlavi));
  const tdee = Math.round(bmr * p.aktivita);
  const hubnuti = p.cilVaha > 0 && p.cilVaha < p.vaha;
  const deficit = hubnuti ? Math.round((p.tempo||0.5)*7700/7) : 0;
  const cilKcal = hubnuti ? Math.max(tdee-deficit, p.pohlavi==="muz"?1500:1200) : tdee;
  return { bmr, tdee, cilKcal, deficit, hubnuti,
    protein: p.macroBilk!=null ? p.macroBilk : Math.round(p.vaha*2.0),
    tuky: p.macroTuky!=null ? p.macroTuky : Math.round(cilKcal*0.28/9),
    sacharidy: p.macroSach!=null ? p.macroSach : Math.round(cilKcal*0.42/4),
    voda: p.vodaCil || Math.round(p.vaha*35) };
}
function totals(){
  return entries.filter(e=>e&&!e._del).reduce((a,e)=>({
    kcal: a.kcal+(e.kcal||0), b: a.b+(e.b||0), s: a.s+(e.s||0),
    t: a.t+(e.t||0), vl: a.vl+(e.vl||0), voda: a.voda+0
  }),{kcal:0,b:0,s:0,t:0,vl:0,voda:0});
}

// ==================== RENDER ====================
function render(){
  entries = entries.filter(e => e !== undefined);
  const T = totals();
  const tg = targets();
  const kcalLimit = tg.cilKcal;
  const kcalPct = Math.min(T.kcal/kcalLimit*100,100);
  const bySlot = SLOTS.map(s=>({slot:s,items:entries.filter(e=>e.slot===s&&!e._del)}));

  let html = `<div style="min-height:100vh;padding-bottom:80px;max-width:1200px;margin:0 auto">
  <div style="background:var(--card);border-bottom:1px solid var(--border);padding:0 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;overflow-x:auto">
      <button class="tab-btn${tab==="dnes"?" active":""}" onclick="setTab('dnes')">🍽 Dnes</button>
      <button class="tab-btn${tab==="historie"?" active":""}" onclick="setTab('historie')">📅 Historie</button>
      <button class="tab-btn${tab==="aktivity"?" active":""}" onclick="setTab('aktivity')">🏃 Aktivity</button>
      <button class="tab-btn${tab==="profil"?" active":""}" onclick="setTab('profil')">⚙️ Profil</button>
    </div>
    <button onclick="toggleDark()" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 10px;font-size:18px">${dark?"☀️":"🌙"}</button>
  </div>`;

  if(tab==="dnes"){
    html += `<div style="max-width:900px;margin:0 auto;padding:14px 16px">
      <div class="card" style="padding:16px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="color:#6366f1;font-weight:700">Kalorie</span>
          <span>${Math.round(T.kcal)} / ${kcalLimit} kcal</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${kcalPct}%;background:linear-gradient(90deg,#6366f1,#8b5cf6)"></div></div>
      </div>
      <div style="display:flex;justify-content:space-around;margin-bottom:12px">
        <div class="card" style="padding:12px;text-align:center;flex:1;margin:0 4px"><div style="font-weight:800;color:#3b82f6">${T.b.toFixed(0)}g</div><div style="font-size:10px;color:var(--muted)">Bílkoviny</div></div>
        <div class="card" style="padding:12px;text-align:center;flex:1;margin:0 4px"><div style="font-weight:800;color:#f59e0b">${T.s.toFixed(0)}g</div><div style="font-size:10px;color:var(--muted)">Sacharidy</div></div>
        <div class="card" style="padding:12px;text-align:center;flex:1;margin:0 4px"><div style="font-weight:800;color:#10b981">${T.t.toFixed(0)}g</div><div style="font-size:10px;color:var(--muted)">Tuky</div></div>
      </div>
      ${bySlot.filter(s=>s.items.length>0).map(({slot,items})=>`<div style="margin-bottom:14px"><div style="color:#6366f1;font-size:11px;font-weight:700;margin-bottom:6px">${slot.toUpperCase()}</div>${items.map(e=>`<div class="entry" style="padding:10px"><div style="display:flex;justify-content:space-between"><span style="font-weight:600">${e.jidlo}</span><span style="color:#f97316;font-weight:800">${Math.round(e.kcal)} kcal</span></div><div style="font-size:11px;color:var(--muted)">${e.porce_g}g</div></div>`).join("")}</div>`).join("")}
      ${entries.length===0?`<div style="text-align:center;padding:40px;color:var(--muted)">🍽 Žádná jídla</div>`:""}
      <button onclick="openAdd()" class="fab">+</button>
    </div>`;
  }

  if(tab==="historie"){
    const days = Object.entries(hist).sort(([a],[b])=>b.localeCompare(a));
    html += `<div style="max-width:900px;margin:0 auto;padding:14px 16px"><div style="font-size:18px;font-weight:800;margin-bottom:12px">📅 Historie</div>`;
    if(!days.length) html += `<div class="card" style="padding:40px;text-align:center">Zatím žádná historie</div>`;
    else html += days.map(([date,items])=>`<div class="card" style="margin-bottom:10px;padding:12px"><div style="font-weight:700">${date}</div><div style="color:#f97316">${Math.round(items.reduce((a,e)=>a+e.kcal,0))} kcal</div><div style="font-size:12px;color:var(--muted)">${items.length} položek</div></div>`).join("");
    html += `</div>`;
  }

  if(tab==="aktivity"){
    html += `<div style="max-width:900px;margin:0 auto;padding:14px 16px"><div style="font-size:18px;font-weight:800;margin-bottom:12px">🏃 Aktivity</div><div class="card" style="padding:20px;text-align:center;color:var(--muted)">Funkce aktivit - zadej přímo v jídelníčku</div></div>`;
  }

  if(tab==="profil"){
    html += `<div style="max-width:500px;margin:0 auto;padding:14px">
      <div style="font-size:18px;font-weight:800;margin-bottom:14px">⚙️ Profil</div>
      <div class="card" style="padding:20px">
        <div style="margin-bottom:15px"><label style="font-weight:700">UŽIVATELSKÉ JMÉNO</label><input id="sync-username" class="inp" type="text" placeholder="např. pepa777" value="${profile.syncUsername||""}" style="margin-top:5px"/></div>
        <button onclick="saveSyncConfig()" class="btn-pri" style="margin-bottom:10px">💾 Uložit a synchronizovat</button>
        
        <div id="sync-status-line" style="font-size:12px;color:var(--muted);padding:8px;background:var(--surface);border-radius:8px;text-align:center;margin-bottom:12px">${localStorage.getItem("last_sync_status")||"Čekám na sync…"}</div>
        
        <button onclick="forceOverwriteFromServer()" style="width:100%;padding:12px;margin-bottom:8px;background:#ef4444;border:none;border-radius:12px;color:#fff;font-weight:700;cursor:pointer">📥 PŘEPSAT LOKÁLNÍ DATA ZE SERVERU</button>
        <button onclick="forceOverwriteToServer()" style="width:100%;padding:12px;margin-bottom:8px;background:#f59e0b;border:none;border-radius:12px;color:#fff;font-weight:700;cursor:pointer">📤 PŘEPSAT SERVER LOKÁLNÍMI DATY</button>
        <button onclick="debugCompareData()" style="width:100%;padding:12px;background:#6366f1;border:none;border-radius:12px;color:#fff;font-weight:700;cursor:pointer">🔍 Debug - porovnat data</button>
        
        <hr style="margin:15px 0;border-color:var(--border)">
        
        <div><label>Váha (kg)</label><input id="prof-weight" class="inp" type="number" value="${profile.vaha}" onchange="updProf('vaha',parseFloat(this.value))" style="margin-top:5px"/></div>
        <div style="margin-top:10px"><label>Výška (cm)</label><input id="prof-height" class="inp" type="number" value="${profile.vyska}" onchange="updProf('vyska',parseFloat(this.value))"/></div>
        <div style="margin-top:10px"><label>Věk</label><input id="prof-age" class="inp" type="number" value="${profile.vek}" onchange="updProf('vek',parseFloat(this.value))"/></div>
      </div>
    </div>`;
  }

  document.getElementById("app").innerHTML = html;

// ==================== SYNCHRONIZACE ====================
let syncTimeout = null;
function getDeviceId(){ let id=localStorage.getItem("device_id"); if(!id){ id=crypto.randomUUID(); localStorage.setItem("device_id",id); } return id; }

function setSyncStatus(msg){
  const el = document.getElementById("sync-status-line");
  if(el) el.textContent = msg;
  localStorage.setItem("last_sync_status", msg);
}

async function syncWithServer(){
  const username = (profile.syncUsername || "").trim();
  if(!username){ setSyncStatus("⚠️ Zadej uživatelské jméno"); return; }
  
  setSyncStatus("🔄 Synchronizuji...");
  showToast("🔄 Synchronizace spuštěna...", "warning");
  
  try{
    const today = TODAY();
    
    // STAŽENÍ
    const getResp = await fetch(`${BACKEND_URL}/data/user_${username.toLowerCase()}`);
    if(getResp.ok){
      const serverData = await getResp.json();
      let changes = 0;
      
      if(serverData.profile && (serverData.profile._profileTs||0) > (profile._profileTs||0)){
        const oldKey = profile.geminiKey;
        profile = {...profile, ...serverData.profile};
        profile.geminiKey = oldKey;
        profile.syncUsername = username;
        sv("prof2", profile);
        changes++;
        showToast(`📥 Profil stažen (váha: ${profile.vaha} kg)`, "success");
      }
      
      if(serverData.weight_log && serverData.weight_log.length){
        sv("weight_log", serverData.weight_log);
        changes++;
      }
      
      if(serverData.entries && serverData.entries[today]){
        const localIds = new Set(entries.map(e=>e.id));
        const newEntries = serverData.entries[today].filter(e=>!localIds.has(e.id));
        if(newEntries.length){
          entries = [...entries, ...newEntries];
          sv("ent_"+today, entries);
          changes++;
          showToast(`📥 ${newEntries.length} nových jídel staženo`, "success");
        }
      }
      
      if(changes) render();
    }
    
    // ODESLÁNÍ
    const body = {
      device_id: getDeviceId(),
      username: username,
      profile: {...profile, _profileTs: Date.now()},
      entries: {[today]: entries.map(e=>({...e, _t:Date.now()}))},
      history: hist,
      receptar: [],
      aktivity: [],
      weight_log: ls("weight_log", [])
    };
    
    const postResp = await fetch(BACKEND_URL+"/sync", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(body)
    });
    
    if(postResp.ok){
      setSyncStatus("☁️ " + new Date().toLocaleTimeString("cs-CZ") + " · OK");
      showToast(`📤 Odesláno: ${entries.length} jídel, ${ls("weight_log",[]).length} vah`, "success");
    }
    
  } catch(e){
    console.error(e);
    setSyncStatus("⚠️ " + e.message);
    showToast("❌ Chyba synchronizace: " + e.message, "error");
  }
}

function scheduleSync(){ clearTimeout(syncTimeout); syncTimeout = setTimeout(()=>syncWithServer(), 2000); }

async function saveSyncConfig(){
  const username = document.getElementById("sync-username")?.value?.trim();
  if(!username){ showToast("❌ Zadej uživatelské jméno", "error"); return; }
  profile.syncUsername = username;
  profile._profileTs = Date.now();
  sv("prof2", profile);
  render();
  showToast(`💾 Uživatelské jméno "${username}" uloženo, spouštím synchronizaci...`, "success");
  await syncWithServer();
  showToast(`✅ Synchronizace dokončena! Data pro ${username} jsou na serveru.`, "success");
}

async function forceOverwriteFromServer(){
  const username = (profile.syncUsername || "").trim();
  if(!username){ showToast("❌ Nejprve zadej uživatelské jméno!", "error"); return; }
  if(!confirm("⚠️ TOTO SMAŽE VŠECHNA TVÁ LOKÁLNÍ DATA a nahradí je daty ze serveru!\n\nOpravdu chceš pokračovat?")) return;
  
  showToast("📥 Stahuji data ze serveru...", "warning");
  try {
    const resp = await fetch(`${BACKEND_URL}/data/user_${username.toLowerCase()}`);
    if(!resp.ok) throw new Error("HTTP " + resp.status);
    const serverData = await resp.json();
    
    if(serverData.profile) {
      const oldKey = profile.geminiKey;
      profile = {...serverData.profile};
      profile.geminiKey = oldKey;
      profile.syncUsername = username;
      profile._profileTs = Date.now();
      sv("prof2", profile);
    }
    if(serverData.weight_log) sv("weight_log", serverData.weight_log);
    if(serverData.entries) {
      const today = TODAY();
      const serverToday = serverData.entries[today] || [];
      sv("ent_"+today, serverToday);
      entries = serverToday;
    }
    
    render();
    showToast(`✅ LOKÁLNÍ DATA PŘEPSÁNA! Váha: ${profile.vaha} kg`, "success");
  } catch(e) { showToast("❌ Chyba: " + e.message, "error"); }
}

async function forceOverwriteToServer(){
  const username = (profile.syncUsername || "").trim();
  if(!username){ showToast("❌ Nejprve zadej uživatelské jméno!", "error"); return; }
  if(!confirm("⚠️ TOTO PŘEPÍŠE VŠECHNA DATA NA SERVERU tvými lokálními daty!\n\nOpravdu chceš pokračovat?")) return;
  
  showToast("📤 Nahrávám data na server...", "warning");
  try {
    const today = TODAY();
    const body = {
      device_id: getDeviceId(),
      username: username,
      profile: {...profile, _profileTs: Date.now()},
      entries: {[today]: entries},
      history: hist,
      receptar: [],
      aktivity: [],
      weight_log: ls("weight_log", [])
    };
    
    const resp = await fetch(BACKEND_URL+"/sync", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(body)
    });
    if(!resp.ok) throw new Error("HTTP " + resp.status);
    
    showToast(`✅ SERVER PŘEPSÁN! Odesláno: ${entries.length} jídel, váha: ${profile.vaha} kg`, "success");
  } catch(e) { showToast("❌ Chyba: " + e.message, "error"); }
}
