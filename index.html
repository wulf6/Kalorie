<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" id="theme-meta" content="#6366f1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Kalorie"/>
<meta name="application-name" content="Kalorie"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<title>Kalorie AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none;font-family:system-ui,-apple-system,sans-serif}
/* Velikost písma se mění pomocí proměnné */
:root{ --base-font-size: 1rem; }
body{font-size:var(--base-font-size);background:var(--bg);color:var(--text);transition:background .3s,color .3s}
button,input,select,textarea{font-family:inherit}
button:active{opacity:.82}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
textarea{resize:none}
input[type=number]::-webkit-inner-spin-button{opacity:1}

:root{
  --bg:#f1f5f9;--card:#fff;--surface:#f1f5f9;--border:#e2e8f0;
  --text:#1e293b;--muted:#6b7280;--track:#e2e8f0;
  --sheet-radius:20px 20px 0 0;
  --fab-bottom:24px;
  --top-safe:env(safe-area-inset-top,0px);
  --bot-safe:env(safe-area-inset-bottom,0px);
}
@media all and (display-mode: standalone){
  body{ padding-top:var(--top-safe); }
  .sticky-header{ top:var(--top-safe) !important; }
}
.dark{--bg:#0a0f1e;--card:#0f172a;--surface:#1e293b;--border:#1e293b;--text:#f1f5f9;--muted:#64748b;--track:#1e293b}
.tab-btn{padding:13px 15px;border:none;background:transparent;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab-btn.active{color:#6366f1;border-bottom-color:#6366f1}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden}
.inp{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:11px 13px;outline:none;width:100%;transition:border-color .2s}
.inp:focus{border-color:#6366f1}
.inp::placeholder{color:var(--muted)}
.btn-pri{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;padding:13px;width:100%;transition:opacity .2s}
.btn-pri:disabled{opacity:.4;cursor:not-allowed}
.prog-bar{background:var(--track);border-radius:99px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .5s ease}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.sheet{
  width:100%;max-width:640px;
  background:var(--card);
  border-radius:var(--sheet-radius);
  border:1px solid var(--border);
  padding:20px 20px max(20px, calc(env(safe-area-inset-bottom) + 20px));
  height:90dvh;
  max-height:90dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.sheet-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-right:2px}
.sheet-footer{flex-shrink:0;padding-top:12px;border-top:1px solid var(--border);margin-top:8px}
.entry{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:8px;animation:slideUp .22s ease}
.slot-btn{padding:5px 11px;border-radius:99px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s}
.slot-btn.active{border-color:#6366f1;color:#6366f1;font-weight:700}
.mode-tab{flex:1;padding:8px 4px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-weight:500;cursor:pointer;font-size:12px;transition:all .2s;white-space:nowrap}
.mode-tab.active{background:#6366f1;color:#fff;font-weight:700}
.tempo-btn{flex:1;padding:9px 4px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-weight:600;cursor:pointer;font-size:11px;text-align:center;line-height:1.5;transition:all .2s}
.tempo-btn.active{border-color:#f59e0b;background:rgba(245,158,11,.08);color:#92400e}
.dark .tempo-btn.active{color:#fbbf24}
.gender-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-weight:600;cursor:pointer;font-size:14px;transition:all .2s}
.gender-btn.active{border-color:#6366f1;color:#6366f1}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scanline{0%{transform:translateY(-50px);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translateY(50px);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .7s linear infinite}
.fab{position:fixed;bottom:var(--fab-bottom);right:20px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:28px;line-height:1;border:none;box-shadow:0 6px 20px rgba(99,102,241,.5);z-index:200;cursor:pointer;display:flex;align-items:center;justify-content:center}
@media (orientation:landscape) and (max-height:500px){
  .sheet{height:100dvh;max-height:100dvh;border-radius:0;padding:12px 16px}
  .sticky-header .tab-btn{padding:8px 12px;font-size:12px}
}
@media (min-width:768px){
  :root{--sheet-radius:16px;--fab-bottom:32px}
  .modal-overlay{align-items:center}
  .sheet{height:auto;max-height:85vh;border-radius:16px;max-width:560px}
  .tab-btn{font-size:14px;padding:14px 18px}
  .mode-tab{font-size:13px}
}
@media (min-width:1024px){
  :root{--fab-bottom:40px}
  .sheet{max-width:600px;max-height:80vh}
  .modal-overlay{align-items:center}
  body{font-size:15px}
  .inp{font-size:15px}
  .tab-btn{font-size:15px;padding:15px 20px}
}
@media (max-height:600px) and (max-width:768px){
  .sheet{height:100dvh;max-height:100dvh;border-radius:0}
  :root{--sheet-radius:0}
}
.fab{padding-bottom:0;bottom:max(var(--fab-bottom),calc(env(safe-area-inset-bottom) + 16px));right:max(20px,calc(env(safe-area-inset-right) + 16px))}
input:focus,textarea:focus{scroll-margin-bottom:120px}
.macro-detail-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}
.macro-detail-card{background:var(--card);border-radius:24px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;padding:20px;border:1px solid var(--border)}
</style>
</head>
<body>
<div id="splash" style="position:fixed;inset:0;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s">
  <div style="font-size:72px;margin-bottom:16px">🍽</div>
  <div style="color:#fff;font-size:24px;font-weight:800;letter-spacing:1px">Kalorie AI</div>
  <div style="color:rgba(255,255,255,.7);font-size:14px;margin-top:8px">Načítám databázi…</div>
  <div style="color:rgba(255,255,255,.5);font-size:11px;margin-top:4px" id="splash-status">připravuji…</div>
</div>
<div id="app"></div>

<div id="macro-detail-modal" style="display:none" class="macro-detail-modal" onclick="closeMacroDetail()">
  <div class="macro-detail-card" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span id="macro-detail-title" style="font-size:18px;font-weight:800"></span>
      <button onclick="closeMacroDetail()" style="background:var(--surface);border:none;border-radius:8px;padding:4px 12px;font-size:18px;cursor:pointer;color:var(--muted)">×</button>
    </div>
    <div id="macro-detail-list" style="max-height:55vh;overflow-y:auto"></div>
    <div id="macro-detail-total" style="margin-top:14px;padding-top:12px;border-top:2px solid var(--border);font-weight:700;text-align:right;font-size:15px"></div>
  </div>
</div>

<div id="scanner" style="display:none;position:fixed;inset:0;z-index:500;background:#000;flex-direction:column">
  <div style="position:relative;flex:1;overflow:hidden">
    <video id="scan-vid" muted playsinline style="width:100%;height:100%;object-fit:cover"></video>
    <canvas id="scan-canvas" style="display:none"></canvas>
    <div style="position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;pointer-events:none">
      <div style="position:relative;width:280px;height:150px;box-shadow:0 0 0 9999px rgba(0,0,0,.5);border-radius:12px">
        <div style="position:absolute;top:0;left:0;width:28px;height:28px;border-top:3px solid #6366f1;border-left:3px solid #6366f1;border-radius:8px 0 0 0"></div>
        <div style="position:absolute;top:0;right:0;width:28px;height:28px;border-top:3px solid #6366f1;border-right:3px solid #6366f1;border-radius:0 8px 0 0"></div>
        <div style="position:absolute;bottom:0;left:0;width:28px;height:28px;border-bottom:3px solid #6366f1;border-left:3px solid #6366f1;border-radius:0 0 0 8px"></div>
        <div style="position:absolute;bottom:0;right:0;width:28px;height:28px;border-bottom:3px solid #6366f1;border-right:3px solid #6366f1;border-radius:0 0 8px 0"></div>
        <div style="position:absolute;left:4px;right:4px;top:50%;height:2px;background:linear-gradient(90deg,transparent,#6366f1,#8b5cf6,transparent);animation:scanline 1.8s ease-in-out infinite"></div>
      </div>
    </div>
    <div id="scan-status" style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:28px 20px 16px;text-align:center;font-size:14px;font-weight:600;color:#fff">Načítám kameru…</div>
  </div>
  <div style="background:#0a0f1e;padding:12px 20px 28px;display:flex;flex-direction:column;gap:10px">
    <button id="scan-fallback-btn" onclick="document.getElementById('scan-file-inp').click()" style="width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:none">📸 Vyfotit čárový kód</button>
    <input type="file" id="scan-file-inp" accept="image/*" capture="environment" style="display:none" onchange="handleScanFile(this)"/>
    <button onclick="closeScanner()" style="width:100%;padding:14px;background:#1e293b;border:1px solid #334155;border-radius:14px;color:#94a3b8;font-size:15px;cursor:pointer">✕ Zavřít</button>
  </div>
</div>

<div id="modal" style="display:none" class="modal-overlay" onclick="closeModal()">
  <div class="sheet" onclick="event.stopPropagation()" style="text-align:center">
    <div id="modal-msg" style="color:var(--text);margin-bottom:20px;font-size:15px;line-height:1.5"></div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button onclick="modalYes()" style="background:#ef4444;color:#fff;border:none;border-radius:10px;padding:10px 22px;font-weight:700;cursor:pointer;font-size:14px">Smazat</button>
      <button onclick="closeModal()" style="background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:10px 22px;font-weight:600;cursor:pointer;font-size:14px">Zrušit</button>
    </div>
  </div>
</div>

<div id="add-sheet" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeAdd()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-shrink:0">
      <div style="font-size:16px;font-weight:700;color:var(--text)">Přidat jídlo</div>
      <button onclick="closeAdd()" style="background:var(--surface);border:none;border-radius:8px;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 10px">×</button>
    </div>
    <div id="slot-row" style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;flex-shrink:0"></div>
    <div style="display:flex;gap:0;margin-bottom:12px;background:var(--surface);border-radius:10px;padding:3px;flex-shrink:0">
      <button class="mode-tab active" id="tab-manual" onclick="setMode('manual')">✏️ Ručně</button>
      <button class="mode-tab" id="tab-ai" onclick="setMode('ai')">🤖 AI</button>
      <button class="mode-tab" id="tab-ean" onclick="setMode('ean')">📷 Sken</button>
      <button class="mode-tab" id="tab-saved" onclick="setMode('saved')">⭐ Moje</button>
    </div>
    <div class="sheet-body">
    <div id="panel-ai" style="display:none">
      <div id="ai-photo-area" style="margin-bottom:10px;border:2px dashed var(--border);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:border-color .2s" onclick="document.getElementById('ai-photo-inp').click()" ondragover="event.preventDefault();this.style.borderColor='#6366f1'" ondragleave="this.style.borderColor=''" ondrop="event.preventDefault();handlePhotoDrop(event)">
        <input type="file" id="ai-photo-inp" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoSelect(this)"/>
        <div id="ai-photo-preview" style="display:none;margin-bottom:8px">
          <img id="ai-photo-img" style="max-height:120px;border-radius:8px;max-width:100%"/>
          <button onclick="event.stopPropagation();clearPhoto()" style="display:block;margin:6px auto 0;background:transparent;border:none;color:#ef4444;font-size:12px;cursor:pointer">× Odebrat foto</button>
        </div>
        <div id="ai-photo-placeholder">
          <div style="font-size:28px;margin-bottom:4px">📸</div>
          <div style="font-size:13px;color:var(--muted)">Vyfotit nebo nahrát jídlo</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">AI odhadne kalorie z fotky</div>
        </div>
      </div>
      <textarea id="ai-input" class="inp" rows="2" placeholder='nebo popiš: „150g ovesné kaše s banánem"…' style="margin-bottom:10px;line-height:1.5" oninput="onAiInput()" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleAI()}"></textarea>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
        <label style="font-size:12px;color:var(--muted);white-space:nowrap">Porce (g):</label>
        <input class="inp" type="number" id="ai-g" value="100" min="1" style="width:80px" />
      </div>
      <button class="btn-pri" id="ai-btn" onclick="handleAI()">🤖 Analyzovat přes Gemini</button>
    </div>
    <div id="panel-manual">
      <div style="position:relative;margin-bottom:8px">
        <input class="inp" id="m-name" placeholder="Název jídla (zkus 'banán', 'kuřecí prsa'…)" oninput="onManualInput()" onkeydown="onManualKey(event)" autocomplete="off"/>
      </div>
      <div id="m-autofill-info" style="display:none;margin-bottom:8px;padding:6px 10px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:12px;color:#16a34a"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div><label style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px">KALORIE (kcal)</label><input class="inp" type="number" id="m-kcal" placeholder="0"/></div>
        <div><label id="m-g-label" style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px">GRAMY (g)</label><input class="inp" type="number" id="m-g" placeholder="100" value="100" onchange="onManualGrams()" onblur="onManualGrams()"/></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px">
        <div><label style="font-size:10px;font-weight:700;color:#3b82f6">BÍLK.</label><input class="inp" type="number" id="m-b" placeholder="0"/></div>
        <div><label style="font-size:10px;font-weight:700;color:#f59e0b">SACH.</label><input class="inp" type="number" id="m-s" placeholder="0"/></div>
        <div><label style="font-size:10px;font-weight:700;color:#10b981">TUKY</label><input class="inp" type="number" id="m-t" placeholder="0"/></div>
        <div><label style="font-size:10px;font-weight:700;color:#8b5cf6">VLÁKN.</label><input class="inp" type="number" id="m-vl" placeholder="0"/></div>
      </div>
      <button class="btn-pri" onclick="handleManual()">✅ Přidat</button>
    </div>
    <div id="panel-ean" style="display:none;flex-direction:column;gap:10px">
      <button onclick="openScanner()" style="padding:16px;background:var(--surface);border:2px solid #a5b4fc;border-radius:14px;color:#6366f1;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px"><span style="font-size:22px">📷</span> Otevřít kameru</button>
      <div style="text-align:center;font-size:12px;color:var(--muted)">nebo zadej EAN ručně</div>
      <div style="display:flex;gap:8px"><input class="inp" type="number" id="ean-inp" placeholder="EAN (např. 8594043721012)" onkeydown="if(event.key==='Enter')handleEan()"/><button onclick="handleEan()" style="padding:11px 16px;background:#6366f1;border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;white-space:nowrap">Najít</button></div>
      <div style="font-size:11px;color:var(--muted);text-align:center">Data z Open Food Facts · zdarma · bez API klíče</div>
    </div>
    <div id="panel-saved" style="display:none;flex-direction:column;gap:10px">
      <div id="saved-view-list"></div>
      <button onclick="showCreateFood()" style="padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer">+ Vytvořit nové jídlo</button>
    </div>
    <div id="panel-foodeditor" style="display:none;flex-direction:column;gap:0;height:100%">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-shrink:0"><span style="font-weight:700;font-size:15px" id="editor-title">Nové jídlo</span><button onclick="closeEditor()" style="background:var(--surface);border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 10px;border-radius:8px">← Zpět</button></div>
      <input id="food-editor-name" class="inp" placeholder="Název jídla (např. Guláš, Smoothie…)" style="margin-bottom:10px;flex-shrink:0"/>
      <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:8px">
        <div style="font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.05em">SLOŽKY</div>
        <div id="editor-ingredients" style="display:flex;flex-direction:column;gap:6px"></div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px">
          <div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px">PŘIDAT SUROVINU</div>
          <input id="editor-ing-name" class="inp" placeholder="Název suroviny…" oninput="onEditorIngInput()" onkeydown="onEditorIngKey(event)" autocomplete="off" style="margin-bottom:8px"/>
          <div style="display:flex;gap:8px"><input id="editor-ing-g" class="inp" type="number" value="100" min="1" style="flex:1"/><span style="display:flex;align-items:center;color:var(--muted);font-size:13px;flex-shrink:0">g/ml</span><button onclick="addEditorIngredient()" style="padding:11px 20px;background:#6366f1;border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;font-size:18px;min-width:54px;flex-shrink:0">+</button></div>
        </div>
        <div id="editor-totals" style="padding:10px 14px;background:var(--surface);border-radius:10px;font-size:13px;color:var(--muted);text-align:center;border:1px solid var(--border)">0 kcal</div>
      </div>
      <div style="display:flex;gap:8px;padding-top:10px;flex-shrink:0;border-top:1px solid var(--border)"><button onclick="saveFoodEditor()" style="flex:1;padding:13px 8px;background:linear-gradient(135deg,#0f766e,#0d9488);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:13px;cursor:pointer">💾 Uložit</button><button onclick="saveFoodEditorAndAdd()" style="flex:1;padding:13px 8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:13px;cursor:pointer">✅ Přidat dnes</button></div>
    </div>
    </div>
    <div class="sheet-footer"><div id="add-err" style="display:none;padding:8px 12px;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;color:#ef4444;font-size:13px;margin-bottom:6px"></div><div id="add-ok" style="display:none;padding:8px 12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;color:#16a34a;font-size:13px"></div></div>
  </div>
</div>

<script>
// ======================== GLOBÁLNÍ VELIKOST PÍSMA ========================
function setFontSize(size){
  document.documentElement.style.setProperty('--base-font-size', size);
  profile.fontSize = size;
  sv("prof2", profile);
}
function applyFontSize(size){
  document.documentElement.style.setProperty('--base-font-size', size);
}

// ======================== DATABÁZE (CSV -> JSON) ========================
const FOOD_DB = {};

async function loadFoodDB() {
  const splashStatus = document.getElementById("splash-status");
  if(splashStatus) splashStatus.textContent = "načítám databázi…";
  
  try {
    const cached = localStorage.getItem("food_db_cache_v8");
    const cacheTime = localStorage.getItem("food_db_cache_time_v8");
    const oneDay = 24*60*60*1000;
    if(cached && cacheTime && (Date.now()-parseInt(cacheTime)) < oneDay) {
      const data = JSON.parse(cached);
      Object.assign(FOOD_DB, data);
      const count = Object.keys(FOOD_DB).length;
      if(splashStatus) splashStatus.textContent = `z cache: ${count} položek`;
      return;
    }
  } catch(e) {}
  
  try {
    if(splashStatus) splashStatus.textContent = "stahuji db.json (CSV)…";
    const response = await fetch("db.json?v=" + Date.now(), { cache: "no-cache" });
    if(!response.ok) throw new Error("HTTP "+response.status);
    const csvText = await response.text();
    
    const lines = csvText.split(/\r?\n/);
    if(lines.length === 0) throw new Error("Prázdný soubor");
    
    const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
    const nazevIdx = headers.indexOf("nazev");
    const kcalIdx = headers.indexOf("kcal");
    const bilkIdx = headers.indexOf("bílkoviny");
    const sachIdx = headers.indexOf("sacharidy");
    const tukyIdx = headers.indexOf("tuky");
    const vlakIdx = headers.indexOf("vláknina");
    
    if(nazevIdx === -1) throw new Error("Chybí sloupec 'nazev'");
    
    const newDB = {};
    for(let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if(line === "") continue;
      
      const values = [];
      let inQuote = false;
      let current = "";
      for(let j = 0; j < line.length; j++) {
        const ch = line[j];
        if(ch === '"') {
          inQuote = !inQuote;
        } else if(ch === ',' && !inQuote) {
          values.push(current.trim());
          current = "";
        } else {
          current += ch;
        }
      }
      values.push(current.trim());
      
      const nazev = values[nazevIdx]?.replace(/^"|"$/g, "").trim();
      if(!nazev) continue;
      
      const kcal = parseFloat(values[kcalIdx]) || 0;
      const b = parseFloat(values[bilkIdx]) || 0;
      const s = parseFloat(values[sachIdx]) || 0;
      const t = parseFloat(values[tukyIdx]) || 0;
      const vl = parseFloat(values[vlakIdx]) || 0;
      
      const key = nazev.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
      if(key && (kcal > 0 || b > 0 || s > 0 || t > 0 || vl > 0)) {
        newDB[key] = [nazev, kcal, b, s, t, vl];
      }
    }
    
    if(Object.keys(newDB).length > 0) {
      Object.assign(FOOD_DB, newDB);
      try {
        localStorage.setItem("food_db_cache_v8", JSON.stringify(newDB));
        localStorage.setItem("food_db_cache_time_v8", Date.now().toString());
      } catch(e) {}
      const count = Object.keys(FOOD_DB).length;
      if(splashStatus) splashStatus.textContent = `načteno ${count} položek`;
      return;
    }
    throw new Error("Žádná platná data v CSV");
  } catch(e) {
    console.warn("Chyba načítání CSV:", e);
    if(splashStatus) splashStatus.textContent = "chyba načítání, používám záložní DB…";
  }
  
  Object.assign(FOOD_DB, {
    "banan":["Banán",94,1.2,22,0.2,2],
    "jablko":["Jablko",62,0.4,13,0.4,3],
    "mrkev":["Mrkev",42,1,7,0.2,3],
    "brambory":["Brambory vařené",84,1.7,18,0.1,1],
    "vejce":["Vejce",151,12,1,11,0],
    "kureci prsa":["Kuřecí prsa",106,23,0,1.5,0],
    "rohlik":["Rohlík bílý",310,9.8,57,3.7,4],
    "chleb":["Chléb kmínový",244,8,45,1,4],
    "sunka":["Šunka",118,19,0.5,4.5,0],
    "mleko":["Mléko",46,3.3,4.7,1.5,0],
    "jogurt":["Jogurt bílý",71,4.3,4.5,3.4,0],
    "syr":["Sýr Eidam",323,30,0,22,0],
    "ryze":["Rýže vařená",131,2.7,29,0.3,0],
    "testoviny":["Těstoviny vařené",154,5,29,1,2]
  });
  const count = Object.keys(FOOD_DB).length;
  if(splashStatus) splashStatus.textContent = `záložní DB: ${count} položek`;
}

// ======================== GEMINI API (OPRAVENÉ MODELY) ========================
const GEMINI_MODELS = [
  "gemini-1.5-flash",
  "gemini-1.5-flash-8b",
  "gemini-2.0-flash-exp",
  "gemini-2.0-flash"
];

async function callGemini(key, prompt, imageBase64 = null, imageMime = "image/jpeg") {
  const parts = [];
  if(imageBase64) {
    parts.push({ inline_data: { mime_type: imageMime, data: imageBase64 } });
  }
  parts.push({ text: prompt });
  
  const body = { contents: [{ parts }] };
  let lastError = null;
  
  for(const model of GEMINI_MODELS) {
    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
      const resp = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      
      const data = await resp.json();
      if(resp.status === 200) return data;
      if(resp.status === 404 || (data?.error?.message || "").toLowerCase().includes("not found")) {
        continue;
      }
      throw new Error(data?.error?.message || `HTTP ${resp.status}`);
    } catch(e) {
      lastError = e;
      if(e.message.includes("model_not_found") || e.message.includes("404")) continue;
      throw e;
    }
  }
  throw lastError || new Error("Žádný Gemini model není dostupný");
}

function normKey(s){ return s.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9 ]/g,"").trim(); }

function targets(){
  const p=profile; const bmr=Math.round(calcBMR(p.vaha,p.vyska,p.vek,p.pohlavi)); const tdee=Math.round(bmr*p.aktivita);
  const hubnuti=p.cilVaha>0&&p.cilVaha<p.vaha; const deficit=hubnuti?Math.round((p.tempo||0.5)*7700/7):0;
  const cilKcal=hubnuti?Math.max(tdee-deficit,p.pohlavi==="muz"?1500:1200):tdee;

  const datumCil=tydny>0?new Date(Date.now()+tydny*7*86400000).toLocaleDateString("cs-CZ"):null;
  return { bmr, tdee, cilKcal, deficit, hubnuti, tydny, datumCil,
    protein:p.macroBilk!=null?p.macroBilk:Math.round(p.vaha*2.0),

    voda:p.vodaCil||Math.round(p.vaha*35) };
}

function onEditorIngInput(){
  const inp = document.getElementById("editor-ing-name");
  const q = normKey(inp.value);
  if(q.length < 2){ hideGlobalSuggest(); return; }
  const matches = Object.entries(FOOD_DB).filter(([k])=>k.includes(q)).slice(0,8).map(([,e])=>e);
  showGlobalSuggest(inp, matches, (entry) => {
    document.getElementById("editor-ing-name").value = entry[0];
    document.getElementById("editor-ing-g").value = isLiquid(entry[0])?250:100;

function onEditorIngKey(ev){
  if(ev.key==="Enter"){ev.preventDefault();addEditorIngredient();}

function addEditorIngredient(){
  const name = document.getElementById("editor-ing-name").value.trim();
  if(!name) return;
  const g = parseFloat(document.getElementById("editor-ing-g").value)||100;
  const found = lookupLocal(name);
  const entry = found || [name,0,0,0,0,0];
  const r = g/100;
  editorIngredients.push({id:Date.now()+Math.random(), j:entry[0]||name, g, k:entry[1]*r, b:entry[2]*r, s:entry[3]*r, t:entry[4]*r, vl:(entry[5]||0)*r, isWater:isLiquid(name)});
  document.getElementById("editor-ing-name").value="";
  document.getElementById("editor-ing-g").value=100;
  renderEditorIngredients();
}

// ======================== EAN A SCANNER ========================
async function handleEan(){ const code=document.getElementById("ean-inp").value.trim(); if(!code){ showErr("Zadej EAN kód."); return; } await lookupBarcode(code); }
async function lookupBarcode(code){
  clearMsg(); showOk("Hledám produkt v databázi…");
  try{
    const r=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}?fields=product_name,product_name_cs,brands,nutriments,serving_size`);
    const d=await r.json();
    if(d.status===1&&d.product){
      const p=d.product, n=p.nutriments||{};
      const name=p.product_name_cs||p.product_name||p.brands||"Produkt "+code;
      const porce=parseFloat(p.serving_size)||100;
      const kcal100=parseFloat(n["energy-kcal_100g"])||parseFloat(n["energy-kcal_serving"])||0;
      addEntry({ jidlo:name, porce_g:porce, kcal:kcal100*porce/100, b:(parseFloat(n.proteins_100g)||0)*porce/100, s:(parseFloat(n.carbohydrates_100g)||0)*porce/100, t:(parseFloat(n.fat_100g)||0)*porce/100, vl:(parseFloat(n.fiber_100g)||0)*porce/100, isWater:isLiquid(name), source:"barcode" });
      showOk(name+" přidáno!"); setTimeout(closeAdd,1200); return;
    }
  }catch(_){}
  if(profile.geminiKey){
    try{
      const prompt=GEMINI_PROMPT+`\n\nEAN čárový kód: ${code}. Identifikuj tento produkt a uveď jeho nutriční hodnoty na 100g.`;
      const data=await callGemini(profile.geminiKey, prompt);
      const raw=(data.candidates?.[0]?.content?.parts?.[0]?.text||"").replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(raw);
      if(parsed.jidlo&&typeof parsed.kcal==="number"){ addEntry({...parsed, porce_g:parsed.porce_g||100, source:"barcode"}); showOk("AI: "+parsed.jidlo+" přidáno (odhad)"); setTimeout(closeAdd,1500); return; }
    }catch(_){}
  }
  showErr("Produkt (EAN "+code+") nenalezen.");
}
function openScanner(){ document.getElementById("scan-file-inp").click(); }
function closeScanner(){ document.getElementById("scanner").style.display="none"; try{ if(window.Quagga) Quagga.stop(); }catch(_){} }
async function handleScanFile(inp){
  const file=inp.files[0]; if(!file) return;
  document.getElementById("scanner").style.display="flex";
  const statusEl=document.getElementById("scan-status"); statusEl.textContent="Zpracovávám fotku…";
  const reader=new FileReader();
  reader.onload=async (e)=>{
    if("BarcodeDetector" in window){
      try{
        const img=new Image(); img.src=e.target.result; await new Promise(res=>img.onload=res);
        const canvas=document.createElement("canvas"); canvas.width=img.width; canvas.height=img.height;
        canvas.getContext("2d").drawImage(img,0,0);
        const detector=new BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128","code_39"]});
        const codes=await detector.detect(canvas);
        if(codes.length){ closeScanner(); openAdd(); setMode("ean"); lookupBarcode(codes[0].rawValue); return; }
      }catch(_){}
    }
    statusEl.innerHTML="<span style='color:#fca5a5'>Kód nerozpoznán</span>";
  };
  reader.readAsDataURL(file);
}

function getTypicalGrams(name){ if(!name) return 100; const normalized=name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); let bestMatch=null, bestLength=0; for(let key in TYPICAL_G){ if(normalized.includes(key)&&key.length>bestLength){ bestLength=key.length; bestMatch=TYPICAL_G[key]; } } return bestMatch!==null?bestMatch:100; }

// ======================== GLOBÁLNÍ SUGGEST ========================
function showGlobalSuggest(inputEl, items, onSelect){
  if(!items||!items.length){ hideGlobalSuggest(); return; }
  let sug=document.getElementById("g-suggest");
  if(!sug){ sug=document.createElement("div"); sug.id="g-suggest"; sug.style.cssText="position:fixed;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.25);z-index:10000;max-height:220px;overflow-y:auto;-webkit-overflow-scrolling:touch"; document.body.appendChild(sug); }
  const rect=inputEl.getBoundingClientRect(); const top=rect.bottom+4; const maxH=window.innerHeight-top-12;
  sug.style.top=top+"px"; sug.style.left=Math.max(8,rect.left)+"px"; sug.style.width=rect.width+"px"; sug.style.maxHeight=Math.min(220,Math.max(80,maxH))+"px";
  sug.innerHTML=items.map((e,i)=>`<div data-idx="${i}" style="padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:14px"><span style="font-weight:500">${e[0]}</span><span style="color:var(--muted);font-size:12px;margin-left:8px;flex-shrink:0">${e[1]} kcal/100g</span></div>`).join("");
  sug.querySelectorAll("[data-idx]").forEach(el=>{ const pick=(ev)=>{ ev.preventDefault(); ev.stopPropagation(); hideGlobalSuggest(); onSelect(items[+el.dataset.idx]); }; el.addEventListener("touchend",pick,{passive:false}); el.addEventListener("mousedown",pick); });
  sug.style.display="block";
}
function hideGlobalSuggest(){ const sug=document.getElementById("g-suggest"); if(sug) sug.style.display="none"; }
document.addEventListener("touchstart",e=>{ const sug=document.getElementById("g-suggest"); if(sug&&sug.style.display!=="none"&&!sug.contains(e.target)) hideGlobalSuggest(); },{passive:true});
document.addEventListener("mousedown",e=>{ const sug=document.getElementById("g-suggest"); if(sug&&sug.style.display!=="none"&&!sug.contains(e.target)) hideGlobalSuggest(); });
